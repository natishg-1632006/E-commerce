service: order-service

frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs22.x
  region: ap-southeast-1
  stage: dev

  profile: Natish

  environment:
    NODE_ENV: production
    SERVICE_NAME: ${env:SERVICE_NAME}
    AWS_REGION: ${env:AWS_REGION}
    DYNAMODB_TABLE_NAME: ${env:DYNAMODB_TABLE_NAME}
    CART_TABLE_NAME: ${env:CART_TABLE_NAME}
    PRODUCTS_TABLE_NAME: ${env:PRODUCTS_TABLE_NAME}
    CART_SERVICE_URL: ${env:CART_SERVICE_URL}
    INVENTORY_SERVICE_URL: ${env:INVENTORY_SERVICE_URL}
    ORDER_PAYMENT_TIMEOUT_MINUTES: ${env:ORDER_PAYMENT_TIMEOUT_MINUTES}
    ORDER_QUEUE_URL: ${env:ORDER_QUEUE_URL}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_NAME}
            - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_NAME}/index/*
            - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:CART_TABLE_NAME}
            - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:PRODUCTS_TABLE_NAME}

functions:
  app:
    handler: lambda.handler
    memorySize: 512
    timeout: 30

    events:
      - httpApi:
          path: /{proxy+}
          method: ANY

      - httpApi:
          path: /
          method: ANY

      - sqs:
          arn: ${env:ORDER_QUEUE_ARN}
          batchSize: 10
          functionResponseType: ReportBatchItemFailures
