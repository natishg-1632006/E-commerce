service: user-service

frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs22.x
  region: ap-southeast-1
  stage: dev

  profile: Natish

  environment:
    NODE_ENV: production
    SERVICE_NAME: ${env:SERVICE_NAME}
    AWS_REGION: ${env:AWS_REGION}
    DYNAMODB_TABLE_NAME: ${env:DYNAMODB_TABLE_NAME}
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_NAME}
            - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_NAME}/index/*

functions:
  app:
    handler: lambda.handler
    memorySize: 512
    timeout: 30

    events:
      - httpApi:
          path: /{proxy+}
          method: ANY

      - httpApi:
          path: /
          method: ANY
